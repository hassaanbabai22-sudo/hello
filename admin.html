<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NexusScent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#080808;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
        #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .login-box{background:#111;border:1px solid #1e1e1e;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
        .login-box .logo-text{color:#00ffcc;font-size:1.6rem;font-weight:900;margin-bottom:6px}
        .login-box .sub{color:#555;font-size:0.85rem;margin-bottom:28px}
        .login-box input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;padding:12px 16px;border-radius:10px;font-size:1rem;outline:none;margin-bottom:12px;transition:border 0.2s}
        .login-box input:focus{border-color:#00ffcc}
        .login-box button{width:100%;background:#00ffcc;color:#111;border:none;padding:13px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
        #login-err{color:#ff6b6b;font-size:0.83rem;margin-top:10px;display:none}
        #admin-panel{display:none}
        .admin-nav{background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
        .admin-nav .logo-text{color:#00ffcc;font-size:1.2rem;font-weight:900}
        .badge-admin{background:#00ffcc22;color:#00ffcc;border:1px solid #00ffcc44;padding:4px 10px;border-radius:20px;font-size:0.75rem}
        .logout-btn{background:transparent;border:1px solid #333;color:#666;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem}
        .logout-btn:hover{border-color:#ff4444;color:#ff4444}
        .admin-body{padding:30px 28px;max-width:900px;margin:0 auto}
        .stats-row{display:flex;gap:14px;margin-bottom:28px;flex-wrap:wrap}
        .stat-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:18px 22px;flex:1;min-width:130px}
        .stat-card .s-num{font-size:2rem;font-weight:900;color:#00ffcc}
        .stat-card .s-lbl{color:#555;font-size:0.8rem;margin-top:2px}
        .filter-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .filter-row input{background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;padding:9px 14px;border-radius:9px;font-size:0.9rem;outline:none;flex:1;min-width:180px}
        .filter-row input:focus{border-color:#00ffcc}
        .filter-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;padding:9px 14px;border-radius:9px;cursor:pointer;font-size:0.83rem;transition:0.2s}
        .filter-btn.active,.filter-btn:hover{border-color:#00ffcc;color:#00ffcc;background:#00ffcc11}
        .order-card{background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:20px 22px;margin-bottom:14px;transition:border 0.2s}
        .order-card:hover{border-color:#2a2a2a}
        .oc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px}
        .oc-id{color:#00ffcc;font-size:1.1rem;font-weight:900;letter-spacing:2px;font-family:monospace}
        .oc-time{color:#444;font-size:0.78rem;margin-top:3px}
        .oc-name{color:#aaa;font-size:0.88rem;margin-top:4px}
        .oc-items{color:#666;font-size:0.83rem;margin-bottom:14px;line-height:1.8}
        .oc-total{color:#fff;font-weight:700;font-size:0.92rem}
        .status-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
        .status-row label{color:#555;font-size:0.8rem}
        .status-select{background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;padding:7px 12px;border-radius:8px;font-size:0.85rem;cursor:pointer;outline:none}
        .update-btn{background:#00ffcc;color:#111;border:none;padding:7px 16px;border-radius:8px;font-size:0.83rem;font-weight:700;cursor:pointer;transition:0.2s}
        .update-btn:hover{background:#00e6b8}
        .updated-flash{color:#00ffcc;font-size:0.8rem;display:none}
        .tcs-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
        .tcs-row label{color:#555;font-size:0.8rem;white-space:nowrap}
        .tcs-input{background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;padding:7px 12px;border-radius:8px;font-size:0.85rem;outline:none;flex:1;min-width:160px;transition:border 0.2s}
        .tcs-input:focus{border-color:#00ffcc}
        .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:0.78rem;font-weight:600}
        .badge-confirmed{background:#00ffcc18;color:#00ffcc;border:1px solid #00ffcc33}
        .badge-processing{background:#ffd70018;color:#ffd700;border:1px solid #ffd70033}
        .badge-shipped{background:#4fc3f718;color:#4fc3f7;border:1px solid #4fc3f733}
        .badge-delivered{background:#69f04018;color:#69f040;border:1px solid #69f04033}
        .badge-cancelled{background:#ff444418;color:#ff4444;border:1px solid #ff444433}
        .empty-state{text-align:center;padding:60px 20px;color:#333;font-size:0.95rem}
        .empty-state i{font-size:2.5rem;margin-bottom:12px;display:block}
        .loading{text-align:center;padding:40px;color:#555}
        .refresh-btn{background:#00ffcc22;border:1px solid #00ffcc44;color:#00ffcc;padding:9px 18px;border-radius:9px;cursor:pointer;font-size:0.88rem;font-weight:600;margin-bottom:20px}
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo-text">NexusScent</div>
        <div class="sub">Admin Panel — Private Access</div>
        <input type="password" id="admin-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') doLogin()">
        <button onclick="doLogin()"><i class="fas fa-lock-open"></i> Login</button>
        <div id="login-err">❌ Wrong password. Try again.</div>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-nav">
        <div>
            <span class="logo-text">NexusScent</span>
            <span class="badge-admin" style="margin-left:10px;">Admin</span>
        </div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div class="admin-body">
        <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh Orders</button>
        <div class="stats-row" id="stats-row"></div>
        <div class="filter-row">
            <input type="text" id="search-input" placeholder="🔍  Search by Order ID or customer name..." oninput="renderOrders()">
            <button class="filter-btn active" data-filter="all"        onclick="setFilter(this)">All</button>
            <button class="filter-btn"        data-filter="confirmed"  onclick="setFilter(this)">Confirmed</button>
            <button class="filter-btn"        data-filter="processing" onclick="setFilter(this)">Processing</button>
            <button class="filter-btn"        data-filter="shipped"    onclick="setFilter(this)">Shipped</button>
            <button class="filter-btn"        data-filter="delivered"  onclick="setFilter(this)">Delivered</button>
            <button class="filter-btn"        data-filter="cancelled"  onclick="setFilter(this)">Cancelled</button>
        </div>
        <div id="orders-container"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading orders...</div></div>
    </div>
</div>

<script>
const ADMIN_PASSWORD = 'nexus2024';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeTWGkjZrB_bpi5MA2r8XybotHboBNbvGCGb10n7nwX5ZU0wDgfnzexDB1YhA8Lex6/exec';
let allOrders = {};

function doLogin(){
    const pass = document.getElementById('admin-pass').value;
    if(pass === ADMIN_PASSWORD){
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display  = 'block';
        loadOrders();
    } else {
        document.getElementById('login-err').style.display = 'block';
    }
}
function doLogout(){
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display  = 'none';
    document.getElementById('admin-pass').value = '';
}

async function loadOrders(){
    document.getElementById('orders-container').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading orders from Google Sheets...</div>';
    try {
        const res  = await fetch(SCRIPT_URL);
        const data = await res.json();
        if(data.success){
            allOrders = data.orders || {};
            renderStats();
            renderOrders();
        }
    } catch(e){
        document.getElementById('orders-container').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Could not load orders. Check your internet connection.</div>';
    }
}

function renderStats(){
    const list   = Object.values(allOrders);
    const counts = {all:list.length, confirmed:0, processing:0, shipped:0, delivered:0, cancelled:0};
    list.forEach(o => { if(counts[o.status]!==undefined) counts[o.status]++; });
    document.getElementById('stats-row').innerHTML = `
        <div class="stat-card"><div class="s-num">${counts.all}</div><div class="s-lbl">Total Orders</div></div>
        <div class="stat-card"><div class="s-num" style="color:#ffd700">${counts.confirmed}</div><div class="s-lbl">Confirmed</div></div>
        <div class="stat-card"><div class="s-num" style="color:#4fc3f7">${counts.shipped}</div><div class="s-lbl">Shipped</div></div>
        <div class="stat-card"><div class="s-num" style="color:#69f040">${counts.delivered}</div><div class="s-lbl">Delivered</div></div>`;
}

let currentFilter = 'all';
function setFilter(btn){
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
}

const BADGE_MAP = {
    confirmed:  ['badge-confirmed',  '✅ Confirmed'],
    processing: ['badge-processing', '⚙️ Processing'],
    shipped:    ['badge-shipped',    '🚚 Shipped'],
    delivered:  ['badge-delivered',  '🎉 Delivered'],
    cancelled:  ['badge-cancelled',  '❌ Cancelled']
};

function renderOrders(){
    const search = document.getElementById('search-input').value.toLowerCase();
    let list = Object.values(allOrders).sort((a,b) => new Date(b.placedAt) - new Date(a.placedAt));
    if(currentFilter !== 'all') list = list.filter(o => o.status === currentFilter);
    if(search) list = list.filter(o => o.orderId.toLowerCase().includes(search) || (o.name||'').toLowerCase().includes(search));
    const container = document.getElementById('orders-container');
    if(!list.length){ container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>No orders found.</div>'; return; }
    container.innerHTML = list.map(order => {
        const [cls, lbl] = BADGE_MAP[order.status] || ['badge-confirmed','Confirmed'];
        const itemsText = (order.items||[]).map(i => i.name).join(', ');
        return `<div class="order-card">
            <div class="oc-top">
                <div>
                    <div class="oc-id">${order.orderId}</div>
                    <div class="oc-time">${formatTime(order.placedAt)}</div>
                    <div class="oc-name">👤 ${order.name} &nbsp;|&nbsp; 📞 ${order.phone}</div>
                    <div class="oc-name">🏠 ${order.address}</div>
                    ${order.tcsNumber ? '<div class="oc-name" style="color:#4fc3f7">🚚 TCS: ' + order.tcsNumber + '</div>' : ''}
                </div>
                <span class="status-badge ${cls}">${lbl}</span>
            </div>
            <div class="oc-items">${itemsText}</div>
            <div class="oc-total">Total: Rs. ${order.total}</div>
            <hr style="border:none;border-top:1px solid #1a1a1a;margin:14px 0">
            <div class="status-row">
                <label>Update Status:</label>
                <select class="status-select" id="sel-${order.orderId}">
                    <option value="confirmed"  ${order.status==='confirmed' ?'selected':''}>✅ Order Confirmed</option>
                    <option value="processing" ${order.status==='processing'?'selected':''}>⚙️ Processing</option>
                    <option value="shipped"    ${order.status==='shipped'   ?'selected':''}>🚚 Shipped</option>
                    <option value="delivered"  ${order.status==='delivered' ?'selected':''}>🎉 Delivered</option>
                    <option value="cancelled"  ${order.status==='cancelled' ?'selected':''}>❌ Cancelled</option>
                </select>
                <button class="update-btn" onclick="updateStatus('${order.orderId}')">Update</button>
                <span class="updated-flash" id="flash-${order.orderId}">✓ Saved!</span>
            </div>
            <div class="tcs-row">
                <label>TCS Tracking No:</label>
                <input class="tcs-input" id="tcs-${order.orderId}" type="text" placeholder="Enter TCS number after shipping" value="${order.tcsNumber||''}">
                <button class="update-btn" onclick="saveTCS('${order.orderId}')"><i class="fas fa-truck"></i> Save</button>
                <span class="updated-flash" id="tcs-flash-${order.orderId}">✓ Saved!</span>
            </div>
        </div>`;
    }).join('');
}

async function updateStatus(orderId){
    const sel   = document.getElementById('sel-' + orderId);
    const newSt = sel.value;
    allOrders[orderId].status = newSt;
    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'updateOrder', orderId, status: newSt })
        });
    } catch(e){}
    renderStats(); renderOrders();
    const flash = document.getElementById('flash-' + orderId);
    if(flash){ flash.style.display='inline'; setTimeout(()=>flash.style.display='none', 2000); }
}

async function saveTCS(orderId){
    const tcsNum = document.getElementById('tcs-' + orderId).value.trim();
    allOrders[orderId].tcsNumber = tcsNum;
    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'updateOrder', orderId, tcsNumber: tcsNum })
        });
    } catch(e){}
    renderOrders();
    const flash = document.getElementById('tcs-flash-' + orderId);
    if(flash){ flash.style.display='inline'; setTimeout(()=>flash.style.display='none', 2000); }
}

function formatTime(iso){
    if(!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'}) + ' ' +
           d.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
}
</script>
</body>
</html>

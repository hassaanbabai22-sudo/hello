<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sapphire - NexusScent</title>
<link href="templatemo-nexus-style.css" rel="stylesheet">
<style>
    body { background: #000; color: #fff; font-family: sans-serif; padding: 50px; }
    .product-container { display: flex; gap: 50px; max-width: 1000px; margin: auto; background: #111; padding: 30px; border-radius: 20px; }
    .product-image img { width: 400px; border-radius: 15px; }
    .product-details { flex: 1; }
    .price { font-size: 2rem; color: #00ffcc; margin: 20px 0; }
    .buy-btn { background: #00ffcc; color: #000; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .back-link { color: #888; text-decoration: none; display: block; margin-bottom: 20px; }
</style>
</head>
<body>
    <a href="gallery.html" class="back-link">← Back to Gallery</a>
    <div class="product-container">
        <div class="product-image">
            <img src="https://pk.sapphireonline.pk/dw/image/v2/BKSB_PRD/on/demandware.static/-/Sites-sapphire-master-catalog/default/dw4018300e/images/11feb25UpdatedImages/000000FRL026_1.jpg?sw=1000&sh=1200" alt="Sapphire">
        </div>
        <div class="product-details">
            <h1>Sapphire</h1>
            <p>Brand: Ahmed Al Maghribi</p>
            <div class="price">Rs. 7,000</div>
            <p><strong>Description:</strong> A premium 100ml Parfum spray with long-lasting sillage. Features notes of fresh ozone and deep sapphire musk.</p>
            <button class="buy-btn" onclick="alert('Added to Cart!')">Add to Cart</button>
        </div>
    </div>
</body>
</html>
